name: Update flake
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'

jobs:
  lockfile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@4a754ab0c192f4d12cf88b5954b9dd13fd2d612e
      - name: Update flake.lock
        uses: DeterminateSystems/update-flake-lock@203e2eb079eca40abff70ea3189192e9adeca500
        with:
          pr-title: "Update flake.lock"
          pr-assignees: rszamszur
          commit-msg: "chore: updates flake.lock"
          token: ${{ secrets.API_GITHUB_TOKEN }}
          pr-labels: |
            dependencies
          pr-body: |
            Automated changes by the [update-flake-lock](https://github.com/DeterminateSystems/update-flake-lock) GitHub Action.
            ```
            {{ env.GIT_COMMIT_MESSAGE }}
            ```
